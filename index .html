<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Birthday Celebration</title>

<style>

/* Background gradient */

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(180deg,#020024,#090979,#000000);
}

/* Galaxy stars */

.star{
position:absolute;
color:white;
font-size:14px;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
0%{opacity:0.2;}
100%{opacity:1;}
}

/* Shooting star */

.shooting{
position:absolute;
width:3px;
height:80px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:shoot 2s linear forwards;
}

@keyframes shoot{
0%{
opacity:1;
transform:translate(0,0) rotate(45deg);
}
100%{
opacity:0;
transform:translate(600px,600px) rotate(45deg);
}
}

/* Glowing title */

h1{
font-size:65px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
0%{text-shadow:0 0 10px white,0 0 20px pink;}
100%{text-shadow:0 0 30px white,0 0 50px cyan;}
}

/* Cake */

#cake{
font-size:120px;
}

/* Knife */

#knife{
font-size:60px;
cursor:pointer;
}

/* Cake slice */

#slice{
font-size:80px;
display:none;
animation:sliceMove 2s forwards;
}

@keyframes sliceMove{
0%{transform:translateX(0);}
100%{transform:translateX(140px);}
}

/* Gift */

#gift{
font-size:100px;
display:none;
cursor:pointer;
}

/* Chocolate */

#choco{
font-size:60px;
display:none;
animation:pop 1.5s forwards;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1.3);}
}

/* Card flip */

.card{
width:300px;
height:200px;
margin:auto;
perspective:1000px;
display:none;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transition:transform 1s;
transform-style:preserve-3d;
}

.card.flip .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:10px;
box-shadow:0 0 15px gray;
}

.card-front{
background:white;
}

.card-front img{
width:100%;
height:100%;
border-radius:10px;
}

.card-back{
background:white;
color:black;
transform:rotateY(180deg);
display:flex;
align-items:center;
justify-content:center;
padding:10px;
text-align:center;
}

/* Fireworks */

.particle{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:burst 2s forwards;
}

@keyframes burst{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(var(--x),var(--y));opacity:0;}
}

/* Rocket */

.rocket{
position:absolute;
bottom:0;
font-size:25px;
animation:launch 1.2s linear forwards;
}

@keyframes launch{
0%{transform:translateY(0);}
100%{transform:translateY(-600px);}
}

/* Balloons */

.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation:balloonMove 10s linear infinite;
}

@keyframes balloonMove{
0%{transform:translateY(0);}
100%{transform:translateY(-1100px);}
}

</style>

</head>

<body>

<h1>🎉 Happy Birthday Saro 🎂</h1>

<div id="cake">🎂</div>

<p>Click the knife to cut the cake</p>

<div id="knife">🔪</div>

<br>

<div id="slice">🍰</div>

<br>

<div id="gift">🎁</div>

<br>

<div id="choco">🍫🍫🍫</div>

<br>

<div class="card" id="card">

<div class="card-inner">

<div class="card-front">
<img src="https://uploads.onecompiler.io/44geg4vrh/44ggzr7zz/1000091355.jpg">
</div>

<div class="card-back">
<h3>🎂  Congrats on surviving another year of adulthood! It's a tough game, but you keep levelling up🥳!</h3>
</div>

</div>

</div>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c9e1a8b18.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3">
</audio>

<script>

/* Create galaxy stars */

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

star.innerHTML="✦";

star.style.left=Math.random()*window.innerWidth+"px";
star.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(star);

}

/* Shooting stars */

function shootingStar(){

let s=document.createElement("div");

s.className="shooting";

s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=Math.random()*200+"px";

document.body.appendChild(s);

setTimeout(()=>s.remove(),2000);

}

setInterval(shootingStar,3000);

/* Fireworks */

function firework(x,y){

let colors=["red","yellow","blue","green","purple","orange","pink"];

for(let i=0;i<60;i++){

let p=document.createElement("div");

p.className="particle";

p.style.background=colors[Math.floor(Math.random()*colors.length)];

p.style.left=x+"px";
p.style.top=y+"px";

let angle=Math.random()*2*Math.PI;

let radius=120+Math.random()*100;

p.style.setProperty("--x",Math.cos(angle)*radius+"px");
p.style.setProperty("--y",Math.sin(angle)*radius+"px");

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);

}

}

/* Rocket fireworks */

function launchRocket(){

let rocket=document.createElement("div");

rocket.className="rocket";

rocket.innerHTML="🚀";

rocket.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(rocket);

setTimeout(()=>{

firework(rocket.offsetLeft,window.innerHeight-600);

rocket.remove();

},1200);

}

setInterval(launchRocket,2000);

/* Cake cutting */

document.getElementById("knife").onclick=function(){

document.getElementById("slice").style.display="block";

document.getElementById("gift").style.display="block";

firework(window.innerWidth/2,200);

}

/* Gift opening */

document.getElementById("gift").onclick=function(){

document.getElementById("choco").style.display="block";

let card=document.getElementById("card");

card.style.display="block";

document.getElementById("music").play();

setTimeout(()=>{
card.classList.add("flip");
},3000);

firework(window.innerWidth/2,200);

}

/* Balloons */

for(let i=0;i<10;i++){

let balloon=document.createElement("div");

balloon.className="balloon";

balloon.innerHTML="🎈";

balloon.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(balloon);

}

</script>

</body>
</html>
